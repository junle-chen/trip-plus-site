<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Trip+ benchmark construction pipeline</title>
  <desc id="desc">A presentation-style four-step overview showing sandbox environment, traveler profile, multi-turn interaction, and evaluation.</desc>
  <defs>
    <filter id="softShadow" x="-14%" y="-16%" width="128%" height="132%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#9aa8bb"/>
    </marker>
    <style>
      .serif{font-family:Georgia, Times New Roman, serif;}
      .sans{font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;}
      .main-title{font-size:34px;font-weight:800;fill:#111827;}
      .subtitle{font-size:15px;font-weight:600;fill:#64748b;}
      .step-no{font-size:21px;font-weight:800;}
      .step-title{font-size:25px;font-weight:800;fill:#17202a;}
      .mini-title{font-size:15px;font-weight:800;}
      .label{font-size:13px;font-weight:700;fill:#64748b;}
      .micro{font-size:11px;font-weight:700;fill:#64748b;}
      .blue{fill:#3b6ab7;}
      .green{fill:#5a9f45;}
      .orange{fill:#d8891c;}
      .red{fill:#d83b38;}
      .purple{fill:#7c3aed;}
    </style>
  </defs>

  <rect width="1200" height="560" rx="30" fill="#fbfcff"/>
  <text class="serif main-title" x="600" y="45" text-anchor="middle">Trip+ Benchmark Construction</text>
  <text class="sans subtitle" x="600" y="74" text-anchor="middle">from grounded travel data to profile-aware, stateful, every-turn evaluation</text>

  <g stroke="#9aa8bb" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="293" y1="269" x2="322" y2="269"/>
    <line x1="582" y1="269" x2="611" y2="269"/>
    <line x1="873" y1="269" x2="902" y2="269"/>
  </g>

  <!-- Step 1 -->
  <g transform="translate(42 105)" filter="url(#softShadow)">
    <rect width="251" height="370" rx="20" fill="#ffffff" stroke="#a8c5ef" stroke-width="2"/>
    <rect x="15" y="15" width="221" height="58" rx="16" fill="#eef6ff" stroke="#b7d1f3"/>
    <circle cx="43" cy="44" r="18" fill="#ffffff" stroke="#4d7fd6" stroke-width="2"/>
    <text class="serif step-no blue" x="43" y="51" text-anchor="middle">1</text>
    <text class="serif step-title" x="138" y="51" text-anchor="middle">Sandbox</text>

    <rect x="22" y="91" width="207" height="100" rx="16" fill="#f8fbff" stroke="#c9dbf7"/>
    <text class="sans mini-title blue" x="126" y="118" text-anchor="middle">Travel Data Sandbox</text>
    <image href="pipeline-icons/airplane.png" x="37" y="132" width="32" height="32"/>
    <image href="pipeline-icons/train.png" x="76" y="132" width="32" height="32"/>
    <image href="pipeline-icons/transit.png" x="115" y="132" width="32" height="32"/>
    <image href="pipeline-icons/hotel.png" x="154" y="132" width="32" height="32"/>
    <image href="pipeline-icons/restaurant.png" x="193" y="132" width="32" height="32"/>

    <g transform="translate(22 213)">
      <rect width="96" height="58" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
      <image href="pipeline-icons/poi.png" x="11" y="12" width="34" height="34"/>
      <text class="sans micro" x="67" y="24" text-anchor="middle">POIs</text>
      <text class="sans micro" x="67" y="40" text-anchor="middle">hotels, meals</text>
      <rect x="111" width="96" height="58" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
      <image href="pipeline-icons/weather.png" x="122" y="12" width="34" height="34"/>
      <text class="sans micro" x="166" y="24" text-anchor="middle">weather</text>
      <text class="sans micro" x="166" y="40" text-anchor="middle">environment</text>
    </g>

    <g transform="translate(22 293)">
      <rect width="207" height="46" rx="14" fill="#eef6ff" stroke="#c9dbf7"/>
      <image href="pipeline-icons/tools.png" x="14" y="9" width="28" height="28"/>
      <text class="sans label" x="118" y="21" text-anchor="middle">40 cities, fixed dates,</text>
      <text class="sans label" x="118" y="36" text-anchor="middle">11 travel tools</text>
    </g>
  </g>

  <!-- Step 2 -->
  <g transform="translate(333 105)" filter="url(#softShadow)">
    <rect width="249" height="370" rx="20" fill="#ffffff" stroke="#a8c5ef" stroke-width="2"/>
    <rect x="15" y="15" width="219" height="58" rx="16" fill="#eef6ff" stroke="#b7d1f3"/>
    <circle cx="43" cy="44" r="18" fill="#ffffff" stroke="#4d7fd6" stroke-width="2"/>
    <text class="serif step-no blue" x="43" y="51" text-anchor="middle">2</text>
    <text class="serif step-title" x="139" y="51" text-anchor="middle">Profiles</text>

    <text class="sans mini-title blue" x="125" y="109" text-anchor="middle">11 diverse traveler profiles</text>
    <image href="pipeline-icons/backpacker.png" x="35" y="129" width="48" height="48"/>
    <image href="pipeline-icons/couple.png" x="100" y="129" width="48" height="48"/>
    <image href="pipeline-icons/senior.png" x="165" y="129" width="48" height="48"/>
    <image href="pipeline-icons/family.png" x="35" y="198" width="48" height="48"/>
    <image href="pipeline-icons/foodfirst.png" x="100" y="198" width="48" height="48"/>
    <image href="pipeline-icons/business.png" x="165" y="198" width="48" height="48"/>

    <g transform="translate(22 288)">
      <rect width="96" height="52" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
      <text class="sans mini-title blue" x="48" y="22" text-anchor="middle">memory</text>
      <text class="sans micro" x="48" y="38" text-anchor="middle">observable</text>
      <rect x="111" width="96" height="52" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
      <text class="sans mini-title orange" x="159" y="22" text-anchor="middle">rules</text>
      <text class="sans micro" x="159" y="38" text-anchor="middle">hidden suitability</text>
    </g>
  </g>

  <!-- Step 3 -->
  <g transform="translate(624 105)" filter="url(#softShadow)">
    <rect width="249" height="370" rx="20" fill="#ffffff" stroke="#f1d29d" stroke-width="2"/>
    <rect x="15" y="15" width="219" height="58" rx="16" fill="#fffbeb" stroke="#f4d28b"/>
    <circle cx="43" cy="44" r="18" fill="#ffffff" stroke="#d8891c" stroke-width="2"/>
    <text class="serif step-no orange" x="43" y="51" text-anchor="middle">3</text>
    <text class="serif step-title" x="141" y="51" text-anchor="middle">Interactions</text>

    <g transform="translate(24 95)">
      <rect width="86" height="54" rx="14" fill="#f8fafc" stroke="#dbe3ed"/>
      <text class="sans label" x="43" y="22" text-anchor="middle">hidden</text>
      <text class="sans label" x="43" y="38" text-anchor="middle">state</text>
      <path d="M116 27 H145" stroke="#9aa8bb" stroke-width="3" marker-end="url(#arrow)"/>
      <rect x="154" width="71" height="54" rx="14" fill="#eef6ff" stroke="#bfdbfe"/>
      <text class="sans label blue" x="190" y="22" text-anchor="middle">user</text>
      <text class="sans label" x="190" y="38" text-anchor="middle">turn</text>
    </g>

    <g transform="translate(22 177)">
      <rect width="96" height="62" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
      <image href="pipeline-icons/budget.png" x="10" y="13" width="34" height="34"/>
      <text class="sans micro" x="68" y="25" text-anchor="middle">state</text>
      <text class="sans micro" x="68" y="40" text-anchor="middle">evolution</text>
      <rect x="111" width="96" height="62" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
      <image href="pipeline-icons/question.png" x="122" y="13" width="34" height="34"/>
      <text class="sans micro" x="166" y="25" text-anchor="middle">request</text>
      <text class="sans micro" x="166" y="40" text-anchor="middle">resolution</text>
      <rect y="77" width="96" height="62" rx="14" fill="#fef2f2" stroke="#fecaca"/>
      <image href="pipeline-icons/closed.png" x="10" y="13" width="34" height="34"/>
      <text class="sans micro" x="68" y="25" text-anchor="middle">environment</text>
      <text class="sans micro" x="68" y="40" text-anchor="middle">replanning</text>
      <rect x="111" y="77" width="96" height="62" rx="14" fill="#faf5ff" stroke="#ddd6fe"/>
      <image href="pipeline-icons/like.png" x="122" y="13" width="34" height="34"/>
      <text class="sans micro" x="166" y="25" text-anchor="middle">long-horizon</text>
      <text class="sans micro" x="166" y="40" text-anchor="middle">alignment</text>
    </g>
  </g>

  <!-- Step 4 -->
  <g transform="translate(915 105)" filter="url(#softShadow)">
    <rect width="243" height="370" rx="20" fill="#ffffff" stroke="#b9dcaa" stroke-width="2"/>
    <rect x="15" y="15" width="213" height="58" rx="16" fill="#f0fdf4" stroke="#b9dcaa"/>
    <circle cx="43" cy="44" r="18" fill="#ffffff" stroke="#5a9f45" stroke-width="2"/>
    <text class="serif step-no green" x="43" y="51" text-anchor="middle">4</text>
    <text class="serif step-title" x="139" y="51" text-anchor="middle">Evaluation</text>

    <g transform="translate(20 94)">
      <rect width="55" height="34" rx="10" fill="#ecfdf5" stroke="#86efac"/>
      <text class="sans mini-title green" x="28" y="23" text-anchor="middle">Plan</text>
      <rect x="64" width="79" height="34" rx="10" fill="#fffbeb" stroke="#fbbf24"/>
      <text class="sans mini-title orange" x="104" y="23" text-anchor="middle">Clarify</text>
      <rect x="152" width="72" height="34" rx="10" fill="#fff1f2" stroke="#f87171"/>
      <text class="sans mini-title red" x="188" y="23" text-anchor="middle">NoSol</text>
    </g>

    <g transform="translate(21 155)">
      <rect width="98" height="58" rx="14" fill="#f8fafc" stroke="#dbe3ed"/>
      <image href="pipeline-icons/puzzle.png" x="11" y="12" width="34" height="34"/>
      <text class="sans micro" x="70" y="23" text-anchor="middle">feasible</text>
      <text class="sans micro" x="70" y="39" text-anchor="middle">itinerary</text>
      <rect x="109" width="98" height="58" rx="14" fill="#f8fafc" stroke="#dbe3ed"/>
      <image href="pipeline-icons/verifier.png" x="120" y="11" width="35" height="35"/>
      <text class="sans micro" x="171" y="23" text-anchor="middle">verified</text>
      <text class="sans micro" x="171" y="39" text-anchor="middle">evidence</text>

      <rect y="75" width="98" height="58" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
      <image href="pipeline-icons/check.png" x="12" y="12" width="34" height="34"/>
      <text class="sans micro" x="70" y="23" text-anchor="middle">hard + soft</text>
      <text class="sans micro" x="70" y="39" text-anchor="middle">requirements</text>
      <rect x="109" y="75" width="98" height="58" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
      <image href="pipeline-icons/physical.png" x="120" y="12" width="34" height="34"/>
      <text class="sans micro" x="171" y="23" text-anchor="middle">experience</text>
      <text class="sans micro" x="171" y="39" text-anchor="middle">simulation</text>
    </g>

    <g transform="translate(20 326)">
      <rect width="224" height="36" rx="12" fill="#fff7ed" stroke="#fbbf24"/>
      <text class="sans label orange" x="112" y="16" text-anchor="middle">request fulfillment</text>
      <text class="sans label" x="112" y="30" text-anchor="middle">+ intent preservation</text>
    </g>
  </g>

  <g transform="translate(146 505)">
    <rect width="908" height="36" rx="18" fill="#ffffff" stroke="#dbe3ed"/>
    <text class="serif subtitle" x="454" y="23" text-anchor="middle">active user state -> profile-derived rules -> response mode -> minute-level plan -> stateful judge</text>
  </g>
</svg>
