<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Trip+ benchmark construction pipeline</title>
  <desc id="desc">A five-step pipeline from travel data sandbox and traveler profiles to interactions, agent planning, and evaluation.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="430" rx="28" fill="#f8fafc"/>
  <text x="600" y="48" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="30" font-weight="700" fill="#17202a">Trip+ Benchmark Construction</text>
  <text x="600" y="78" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="16" fill="#64748b">state-first tasks, grounded tools, profile-aware verification</text>

  <g transform="translate(50 128)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" fill="#ffffff" stroke="#cfe3dc" stroke-width="2"/>
    <circle cx="90" cy="38" r="22" fill="#ecfdf5" stroke="#0f766e" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#0f766e">1</text>
    <text x="90" y="82" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700" fill="#17202a">Sandbox</text>
    <text x="90" y="110" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">40 cities</text>
    <text x="90" y="132" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">travel tools</text>
  </g>

  <g transform="translate(280 128)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" fill="#ffffff" stroke="#cfe0ff" stroke-width="2"/>
    <circle cx="90" cy="38" r="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#2563eb">2</text>
    <text x="90" y="82" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700" fill="#17202a">Profiles</text>
    <text x="90" y="110" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">11 traveler</text>
    <text x="90" y="132" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">personas</text>
  </g>

  <g transform="translate(510 128)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" fill="#ffffff" stroke="#fde4bd" stroke-width="2"/>
    <circle cx="90" cy="38" r="22" fill="#fffbeb" stroke="#b7791f" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#b7791f">3</text>
    <text x="90" y="82" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700" fill="#17202a">Interactions</text>
    <text x="90" y="110" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">4 scenario</text>
    <text x="90" y="132" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">types</text>
  </g>

  <g transform="translate(740 128)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" fill="#ffffff" stroke="#ead8ff" stroke-width="2"/>
    <circle cx="90" cy="38" r="22" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#7c3aed">4</text>
    <text x="90" y="82" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700" fill="#17202a">Agent</text>
    <text x="90" y="110" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">plan / ask /</text>
    <text x="90" y="132" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">no solution</text>
  </g>

  <g transform="translate(970 128)" filter="url(#shadow)">
    <rect width="180" height="150" rx="18" fill="#ffffff" stroke="#ffd4cc" stroke-width="2"/>
    <circle cx="90" cy="38" r="22" fill="#fff1f2" stroke="#dc6b4a" stroke-width="2"/>
    <text x="90" y="45" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" font-weight="700" fill="#dc6b4a">5</text>
    <text x="90" y="82" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700" fill="#17202a">Evaluation</text>
    <text x="90" y="110" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">feasible</text>
    <text x="90" y="132" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="15" fill="#64748b">personalized</text>
  </g>

  <g stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="236" y1="203" x2="270" y2="203"/>
    <line x1="466" y1="203" x2="500" y2="203"/>
    <line x1="696" y1="203" x2="730" y2="203"/>
    <line x1="926" y1="203" x2="960" y2="203"/>
  </g>

  <g transform="translate(170 330)">
    <rect width="860" height="52" rx="26" fill="#ffffff" stroke="#dbe3ed" stroke-width="2"/>
    <text x="430" y="33" text-anchor="middle" font-family="Georgia, Times New Roman, serif" font-size="18" fill="#475569">hidden state -> user utterance -> response mode -> itinerary checks -> multi-turn preservation</text>
  </g>
</svg>
